kind = "web"
previewPath = "/"
title = "Luffy AI"
version = "1.0.0"
id = "artifacts/luffy-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25780

[services.development]
run = "pnpm --filter @workspace/luffy-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luffy-ai", "run", "build" ]
publicDir = "artifacts/luffy-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25780"
BASE_PATH = "/"
